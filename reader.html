<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="css/reader.css">
  <title>纯净阅读器</title>
</head>

<body>
  <div class="status-bar">
    <div class="time" id="current-time">14:17</div>
  </div>
  <div class="main-container">
    <div class="empty-shelf" id="empty-shelf">
      <div class="empty-icon">📚</div>
      <div class="empty-text">书架空空如也<br>导入书籍开始阅读吧</div>
      <button class="import-button" onclick="showImportPanel()">导入书籍</button>
    </div>
    <div class="shelf-view" id="shelf-view" style="display: none;">
      <div class="shelf-header">
        <h1 class="shelf-title">我的书架</h1>
      </div>
      <div class="books-grid" id="books-container">
      </div>
    </div>
    <div class="reader-view" id="reader-view">
      <div class="reader-container">
        <div class="page-container" id="page-container">
        </div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-item active" onclick="switchView('shelf')">
      <div class="tab-icon">📚</div>
      <div>书架</div>
    </button>
    <button class="tab-item" onclick="showFavorites()">
      <div class="tab-icon">⭐</div>
      <div>我的收藏</div>
    </button>
    <button class="tab-item" onclick="showImportPanel()">
      <div class="tab-icon">➕</div>
      <div>导入</div>
    </button>
    <button class="tab-item" onclick="showSettings()">
      <div class="tab-icon">⚙️</div>
      <div>设置</div>
    </button>
  </div>
  <div class="import-panel" id="import-panel">
    <div class="import-content">
      <h2 class="import-title">导入书籍</h2>

      <!-- 导入选项 -->
      <div class="import-options">
        <button class="import-option" onclick="document.getElementById('file-input').click()">从设备导入TXT/MD文件</button>
        <button class="import-option" onclick="addSampleBook()">添加示例书籍</button>
      </div>

      <!-- 文件上传按钮 -->
      <input type="file" id="file-input" accept=".txt,.md" onchange="handleFileSelect(event)" style="display: none;" />

      <!-- 上传进度条容器 -->
      <div id="progress-container"
        style="display:none; width:100%; background:#eee; height:6px; border-radius:3px; margin-top:10px;">
        <div id="progress-bar" style="width:0%; height:100%; background:#4caf50; border-radius:3px;"></div>
      </div>

      <div style="color: gray; font-size: 12px;">为保证服务质量，您的文件会被保存在服务端，请注意隐私安全</div>

      <!-- 关闭按钮 -->
      <button class="import-close" onclick="hideImportPanel()">取消</button>
    </div>
  </div>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">阅读设置</div>
    <div class="settings-options">
      <div class="option">
        <button class="option-button" onclick="changeFontSize('increase')">A+</button>
        <div class="option-name">增大字体</div>
      </div>
      <div class="option">
        <button class="option-button" onclick="changeFontSize('decrease')">A-</button>
        <div class="option-name">减小字体</div>
      </div>
      <div class="option">
        <button class="option-button" onclick="toggleNightMode()">🌙</button>
        <div class="option-name">夜间模式</div>
      </div>
      <div class="option">
        <button class="option-button" onclick="toggleScrollMode()">📜</button>
        <div class="option-name">滚动模式</div>
      </div>
      <div class="option">
        <button class="option-button" onclick="toggleFavorite()" id="favorite-btn">☆</button>
        <div class="option-name">收藏</div>
      </div>
    </div>
    <input type="file" id="file-input" class="file-input" accept=".txt,.md" onchange="handleFileSelect(event)">
  </div>
  <script src="js/reader.js"></script>
</body>

</html>
